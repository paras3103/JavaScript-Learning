<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: black; color: white;">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>
    function addLanguage (lang) {
        const li = document.createElement('li')
        li.innerHTML = `${lang}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage('paython')
    addLanguage('Java')
    addLanguage('CSS')


    function addOptilanguage (lang) {
        const li = document.createElement('li')
        // const newValue = document.createTextNode(lang)
        li.appendChild(document.createTextNode(lang))
        document.querySelector('.language').appendChild(li)
    }
    addOptilanguage('Hello User')

    // Edit

    const second = document.querySelector('li:nth-child(2)')
    // second.innerHTML = 'Hello User'
    const newLi = document.createElement('li')
    newLi.textContent = 'mojo'
    second.replaceWith(newLi) 

    // Edit
    const newli = document.querySelector('li:nth-child(2)')
    newli.outerHTML = '<li class = "new"> I am paras</li>'


    // Remove Methonds    
    const secondRemove = document.querySelector('li:nth-child(2)')
    secondRemove.remove(newLi)
</script>
</html>
